name: Build Tron Miner
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission for Gradlew
        # This ensures the 'Robot' has permission to run the ./gradlew file
        run: chmod +x gradlew

      - name: Build Debug APK
        # This is your perfect line!
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TronMiner-Final-APK
          # We point directly to the app's output folder
          path: app/build/outputs/apk/debug/*.apk
          

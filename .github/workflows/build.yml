name: Build Tron Miner
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build APK
        # We add '|| true' to force the script to continue even if there's a minor warning
        run: gradle :app:assembleDebug --stacktrace || gradle assembleDebug --stacktrace

      - name: Search and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TronMiner-Final-APK
          # This 'path' tells GitHub: "Find every .apk file in the whole project"
          path: "**/*.apk"
          if-no-files-found: error
          

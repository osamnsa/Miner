name: Build Tron Miner
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build APK
        # This command searches the whole project for the 'assembleDebug' task
        # It's the "Magic Key" that ignores folder naming errors
        run: gradle assembleDebug --info --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TronMiner-Final-APK
          # This looks everywhere for the .apk file to ensure you get it
          path: "**/*.apk"
          if-no-files-found: error
          

name: Generate Gradle Wrapper
on: workflow_dispatch # This lets you click a "Run" button manually

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Wrapper Files
        # This command creates the .jar and .properties files
        run: gradle wrapper --gradle-version 8.5

      - name: Commit and Push back to Repo
        # This sends the missing files back into your GitHub folder automatically
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties gradlew gradlew.bat
          git commit -m "Auto-generated Gradle Wrapper files"
          git push
          

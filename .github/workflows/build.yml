name: Build Tron Miner
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.5

      - name: Build APK
        # We target the specific project to ensure the APK is generated
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TronMiner-Final-APK
          # This is the "Magic" line: it searches every single folder for the APK
          path: "**/*.apk"
          # This prevents the job from failing if the file takes a second to appear
          if-no-files-found: warn
          

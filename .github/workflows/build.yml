name: Build Tron Miner
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find and Fix Gradlew
        # This command finds gradlew even if it's inside a subfolder
        run: |
          SEARCH_RESULT=$(find . -name gradlew)
          if [ -z "$SEARCH_RESULT" ]; then
            echo "Gradlew not found! Standardizing..."
            gradle help # This will force-generate gradle files if missing
          else
            chmod +x $SEARCH_RESULT
            echo "GRADLEW_PATH=$SEARCH_RESULT" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        # We use the path we just found
        run: ${ { env.GRADLEW_PATH } } :app:assembleDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TronMiner-Final-APK
          path: "**/*.apk"
          
